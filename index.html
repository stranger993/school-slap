<!DOCTYPE html>
<html>
<head>
  <title>School Slap</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
    }

    header {
      padding: 15px;
      background: #111;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
    }

    .container { padding: 10px; }

    textarea, input {
      width: 95%;
      margin: 5px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 8px 12px;
      background: #00ff88;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .post {
      background: #111;
      margin-top: 10px;
      padding: 10px;
      border-radius: 12px;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    .comment {
      background: #222;
      margin-top: 5px;
      padding: 6px;
      border-radius: 6px;
      font-size: 14px;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>📱 School Slap (Live)</header>

<div class="container">

  <textarea id="text" placeholder="What's happening?"></textarea>
  <input type="file" id="img" accept="image/*">
  <button onclick="post()">Post</button>

  <div id="feed"></div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  doc,
  arrayUnion,
  increment,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 PUT YOUR CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// username
let username = localStorage.getItem("user") || prompt("Enter your name:");
localStorage.setItem("user", username);

// POST
window.post = async function () {
  let text = document.getElementById("text").value;
  let file = document.getElementById("img").files[0];

  if (!text && !file) return;

  let image = "";

  if (file) {
    let reader = new FileReader();
    reader.onload = async function (e) {
      image = e.target.result;

      await addDoc(collection(db, "posts"), {
        text,
        image,
        likes: 0,
        user: username,
        comments: [],
        time: Date.now()
      });
    };
    reader.readAsDataURL(file);
  } else {
    await addDoc(collection(db, "posts"), {
      text,
      image: "",
      likes: 0,
      user: username,
      comments: [],
      time: Date.now()
    });
  }

  document.getElementById("text").value = "";
  document.getElementById("img").value = "";
};

// LIVE FEED
const q = query(collection(db, "posts"), orderBy("time", "desc"));

onSnapshot(q, (snap) => {
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  snap.forEach((d) => {
    let p = d.data();

    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="small">${p.user}</div>
      <p>${p.text}</p>
      ${p.image ? `<img src="${p.image}">` : ""}

      <button onclick="likePost('${d.id}', ${p.likes})">❤️ Like (${p.likes})</button>

      <input id="c${d.id}" placeholder="Reply...">
      <button onclick="comment('${d.id}')">Reply</button>

      <div>
        ${(p.comments || []).map(c =>
          `<div class="comment"><b>${c.user}:</b> ${c.text}</div>`
        ).join("")}
      </div>
    `;

    feed.appendChild(div);
  });
});

// LIKE
window.likePost = async function(id, likes) {
  await updateDoc(doc(db, "posts", id), {
    likes: likes + 1
  });
};

// COMMENT
window.comment = async function(id) {
  let input = document.getElementById("c" + id);
  if (!input.value) return;

  await updateDoc(doc(db, "posts", id), {
    comments: arrayUnion({
      user: username,
      text: input.value
    })
  });

  input.value = "";
};
</script>

</body>
</html>
